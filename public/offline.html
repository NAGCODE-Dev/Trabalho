<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Offline | Conferência de Pedidos</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f6f4ee, #e6ecf0);
        color: #0f172a;
        font-family: system-ui, sans-serif;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        background: white;
        border-radius: 28px;
        padding: 24px;
        box-shadow: 0 18px 50px rgba(15, 23, 42, 0.12);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }
      p {
        margin: 0 0 12px;
        line-height: 1.5;
      }
      a {
        display: inline-block;
        margin-top: 8px;
        padding: 12px 16px;
        border-radius: 16px;
        background: #0f172a;
        color: white;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Sem conexão</h1>
      <p>O PWA continua disponível offline para o shell principal e os dados locais já salvos no dispositivo.</p>
      <p>Quando a conexão voltar, reabra a aplicação para sincronizar os assets mais recentes do navegador.</p>
      <a href="/">Voltar para o app</a>
    </div>
  </body>
</html>
